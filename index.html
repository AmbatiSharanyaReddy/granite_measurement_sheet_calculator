<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Granite Measurement Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
margin-bottom:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#eef2f7;
}

input{
padding:6px;
width:120px;
}

button{
padding:8px 16px;
background:#2f64ff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1c4ed8;
}

.total{
margin-top:25px;
font-size:28px;
text-align:right;
font-weight:bold;
color:#2f64ff;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Measurement Calculator</h2>
<p>Formula: (Column A × Column B) ÷ 144</p>

<label>Enter Number of Rows:</label>
<input type="number" id="rowCount">
<button onclick="generateRows()">Generate</button>

<table>

<thead>
<tr>
<th>#</th>
<th>Column A (inches)</th>
<th>Column B (inches)</th>
<th>Column C (sq ft)</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="total">
Total Square Footage: <span id="total">0.00</span> sq ft
</div>

</div>

<script>

function generateRows(){

let count = document.getElementById("rowCount").value
let table = document.getElementById("tableBody")

table.innerHTML = ""

for(let i=1;i<=count;i++){

let row = document.createElement("tr")

row.innerHTML = `
<td>${i}</td>
<td><input type="number" class="inputField"></td>
<td><input type="number" class="inputField"></td>
<td class="result">0.00</td>
`

table.appendChild(row)

}

attachEvents()

}

function attachEvents(){

let inputs = document.querySelectorAll(".inputField")

inputs.forEach((input,index)=>{

input.addEventListener("input",calculate)

input.addEventListener("keydown",function(e){

if(e.key === "Enter"){

e.preventDefault()

let next = inputs[index + 1]

if(next){
next.focus()
}

}

})

})

}

function calculate(){

let rows = document.querySelectorAll("#tableBody tr")

let total = 0

rows.forEach(row => {

let A = row.children[1].children[0].value
let B = row.children[2].children[0].value

A = parseFloat(A) || 0
B = parseFloat(B) || 0

let C = (A * B) / 144

row.querySelector(".result").innerText = C.toFixed(2)

total += C

})

document.getElementById("total").innerText = total.toFixed(2)

}

</script>

</body>
</html>
